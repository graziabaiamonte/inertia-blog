name: Deploy Prod

on:
    workflow_call:

env:
    TARGET_HOST: ${{ vars.TARGET_HOST_PROD }}
    TARGET_PORT: ${{ vars.TARGET_PORT_PROD }}
    TARGET_USER: ${{ vars.TARGET_USER_PROD }}
    TARGET_PATH: ${{ vars.TARGET_PATH_PROD }}

jobs:
    build-and-deploy:
        name: Build and deploy
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Configure PHP 8.4
              uses: shivammathur/setup-php@master
              with:
                  php-version: 8.4
                  extensions: mbstring, ctype, fileinfo, openssl, PDO, bcmath, json, tokenizer, xml

            - name: Composer install (production deps only)
              run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            - name: Compile CSS and Javascript
              run: |
                  npm install
                  npm run build

            - name: Install SSH key
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.DEPLOY_KEY_PROD }}

            - name: Trust remote host
              run: ssh-keyscan -p "${{ env.TARGET_PORT }}" -H "${{ env.TARGET_HOST }}" >> ~/.ssh/known_hosts

            - name: Rsync production files to droplet
              run: |
                  rsync -az --delete \
                    -e "ssh -p ${{ env.TARGET_PORT }}" \
                    --exclude='.env' \
                    --exclude='storage/' \
                    --exclude='bootstrap/cache/*.php' \
                    app bootstrap config database public routes resources/views lang vendor artisan composer.json composer.lock \
                    "${{ env.TARGET_USER }}@${{ env.TARGET_HOST }}:${{ env.TARGET_PATH }}/"

            - name: Finalize release on server
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ env.TARGET_HOST }}
                  username: ${{ env.TARGET_USER }}
                  key: ${{ secrets.DEPLOY_KEY_PROD }}
                  port: ${{ env.TARGET_PORT }}
                  envs: TARGET_PATH
                  script: |
                      cd "${{ env.TARGET_PATH }}"
                      sudo chown -R $(whoami):www-data storage bootstrap/cache
                      sudo chmod -R 775 storage bootstrap/cache
                      php artisan migrate --force
                      php artisan config:cache
                      php artisan route:cache
                      php artisan view:cache
                      sudo systemctl reload php8.4-fpm
