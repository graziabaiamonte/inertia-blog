name: Deploy Prod

on:
  workflow_call:

env:
  TARGET_HOST: ${{ vars.TARGET_HOST_PROD }}
  TARGET_PORT: ${{ vars.TARGET_PORT_PROD }}
  TARGET_USER: ${{ vars.TARGET_USER_PROD }}
  TARGET_PATH: ${{ vars.TARGET_PATH_PROD }}
  ARCHIVE_NAME: ${{ github.sha }}

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile CSS and Javascript
        run: |
          npm install
          npm run build

      - name: Create deployment artifact
        run: |
          tar -czf "${{ env.ARCHIVE_NAME }}.tar.gz" \
            app bootstrap config database public routes resources/views lang artisan composer.json composer.lock

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY_PROD }}

      - name: Trust remote host
        run: ssh-keyscan -p "${{ env.TARGET_PORT }}" -H "${{ env.TARGET_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ secrets.DEPLOY_KEY_PROD }}
          port: ${{ env.TARGET_PORT }}
          source: ${{ env.ARCHIVE_NAME }}.tar.gz
          target: /tmp

      - name: Extract, install dependencies and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ secrets.DEPLOY_KEY_PROD }}
          port: ${{ env.TARGET_PORT }}
          envs: TARGET_PATH,ARCHIVE_NAME
          command_timeout: 30m
          script: |
            cd "${{ env.TARGET_PATH }}"
            rm -rf app bootstrap config database routes resources/views lang public/build
            tar xzf /tmp/${{ env.ARCHIVE_NAME }}.tar.gz -C "${{ env.TARGET_PATH }}"
            rm -f /tmp/${{ env.ARCHIVE_NAME }}.tar.gz
            COMPOSER_MEMORY_LIMIT=-1 composer install --optimize-autoloader --no-dev --no-interaction --prefer-dist
            sudo chown -R $(whoami):www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            php artisan migrate --force
            php artisan storage:link
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            sudo systemctl reload php8.4-fpm
